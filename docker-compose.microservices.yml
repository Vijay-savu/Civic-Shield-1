version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: civicshield-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - civicshield-mongo-data:/data/db

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
    container_name: civicshield-auth-service
    command: node microservices/auth-service/server.js
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/civicshield
      JWT_SECRET: replace-with-a-strong-secret
      AUTH_SERVICE_PORT: 5001
      NODE_ENV: development
    depends_on:
      - mongo

  document-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
    container_name: civicshield-document-service
    command: node microservices/document-service/server.js
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/civicshield
      JWT_SECRET: replace-with-a-strong-secret
      DOCUMENT_SERVICE_PORT: 5002
      NODE_ENV: development
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/eng.traineddata:/app/eng.traineddata
    depends_on:
      - mongo

  verification-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
    container_name: civicshield-verification-service
    command: node microservices/verification-service/server.js
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/civicshield
      JWT_SECRET: replace-with-a-strong-secret
      VERIFICATION_SERVICE_PORT: 5003
      NODE_ENV: development
    depends_on:
      - mongo

  monitoring-service:
    build:
      context: .
      dockerfile: Dockerfile.microservice
    container_name: civicshield-monitoring-service
    command: node microservices/monitoring-service/server.js
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/civicshield
      JWT_SECRET: replace-with-a-strong-secret
      MONITORING_SERVICE_PORT: 5004
      NODE_ENV: development
    depends_on:
      - mongo

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.microservice
    container_name: civicshield-api-gateway
    command: node microservices/gateway/server.js
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      GATEWAY_PORT: 5000
      AUTH_SERVICE_URL: http://auth-service:5001
      DOCUMENT_SERVICE_URL: http://document-service:5002
      VERIFICATION_SERVICE_URL: http://verification-service:5003
      MONITORING_SERVICE_URL: http://monitoring-service:5004
    depends_on:
      - auth-service
      - document-service
      - verification-service
      - monitoring-service

volumes:
  civicshield-mongo-data:
